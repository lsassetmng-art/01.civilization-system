Meta:
  type: object
  required: [request_id]
  properties:
    request_id:
      type: string

ErrorEnvelope:
  type: object
  required: [ok, error, meta]
  properties:
    ok:
      type: boolean
      const: false
    error:
      type: object
      required: [code, message, retryable]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        retryable:
          type: boolean
    meta:
      $ref: '#/Meta'

AssetCreateRequest:
  type: object
  required: [asset_type, creator_id, initial_language_code]
  properties:
    asset_type:
      type: string
    creator_id:
      type: string
      format: uuid
    publisher_id:
      type: string
      format: uuid
      nullable: true
    initial_language_code:
      type: string

AssetCreateResponse:
  type: object
  properties:
    ok:
      type: boolean
      const: true
    data:
      type: object
      properties:
        asset_id:
          type: string
          format: uuid
        asset_code:
          type: string
        asset_type:
          type: string
        creator_id:
          type: string
          format: uuid
        publisher_id:
          type: string
          format: uuid
          nullable: true
        current_version_no:
          type: integer
        lifecycle_state:
          type: string
        version_token:
          type: string
        created_at:
          type: string
          format: date-time
    meta:
      $ref: '#/Meta'

AssetDetailResponse:
  type: object
  properties:
    ok:
      type: boolean
      const: true
    data:
      type: object
      additionalProperties: true
    meta:
      $ref: '#/Meta'


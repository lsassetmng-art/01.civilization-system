RightsPolicyWriteRequest:
  type: object
  required:
    - version_token
    - version_no
    - exhibition_allowed
    - commercial_use_allowed
    - derivative_allowed
    - additional_license_required
    - age_rating
    - region_mode
    - region_codes
  properties:
    version_token:
      type: string
    version_no:
      type: integer
    exhibition_allowed:
      type: boolean
    commercial_use_allowed:
      type: boolean
    derivative_allowed:
      type: boolean
    additional_license_required:
      type: boolean
    age_rating:
      type: string
    region_mode:
      type: string
    region_codes:
      type: array
      items:
        type: string
    rights_summary:
      type: string
      nullable: true

RightsPolicyWriteResponse:
  type: object
  properties:
    ok:
      type: boolean
      const: true
    data:
      type: object
      additionalProperties: true
    meta:
      $ref: '#/Meta'

